<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zando</title>

<link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="style.css" />

</head>
<body>

<!-- ================= HEADER ================= -->
<header class="sticky-top bg-white">
  <nav class="container navbar navbar-expand-lg py-3">

    <a class="navbar-brand fw-bold fs-3" href="#">Zando</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-between" id="mainNav">

      <ul class="navbar-nav gap-lg-4">
        <li class="nav-item"><a class="nav-link" href="#">Women</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Men</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Boy</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Girl</a></li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-search fs-5"></i>
        <div class="position-relative">
          <i class="bi bi-bag fs-5"></i>
          <span class="cart-badge">2</span>
        </div>
        <button class="btn btn-outline-dark btn-sm px-3">Login</button>
        <button class="btn btn-dark btn-sm px-3">Sign Up</button>
      </div>

    </div>
  </nav>
</header>


<!-- ================= HERO BANNER ================= -->
<section id="banner-img" class="d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 class="display-4 fw-bold text-white">New Collection 2026</h1>
    <div class="mt-4 d-flex gap-3 justify-content-center">
      <button class="btn btn-light px-4">SHOP MEN</button>
      <button class="btn btn-outline-light px-4">SHOP WOMEN</button>
    </div>
  </div>
</section>


<!-- ================= LOGO SECTION ================= -->
<div class="container py-4">
  <div class="row text-center g-4">
    <div class="col-6 col-md-3 col-lg-2"><img src="./assets/icon/Zando_Web-1.png" class="img-fluid logo-img"></div>
    <div class="col-6 col-md-3 col-lg-2"><img src="./assets/icon/Zando_Web-1.png" class="img-fluid logo-img"></div>
    <div class="col-6 col-md-3 col-lg-2"><img src="./assets/icon/Zando_Web-1.png" class="img-fluid logo-img"></div>
    <div class="col-6 col-md-3 col-lg-2"><img src="./assets/icon/Zando_Web-1.png" class="img-fluid logo-img"></div>
    <div class="col-6 col-md-3 col-lg-2"><img src="./assets/icon/Zando_Web-1.png" class="img-fluid logo-img"></div>
  </div>
</div>


<!-- ================= CAROUSEL ================= -->
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="./assets/image/banner1.jpg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="./assets/image/banner2.jpg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="./assets/image/banner3.jpg" class="d-block w-100">
    </div>

  </div>
</div>


<!-- ================= PRODUCT SECTION ================= -->
<section class="container py-5">
<h2>Best Seller Item</h2>
<div class="row g-4">

<!-- Product Card -->
<div class="col-12 col-md-6 col-lg-3">
  <div class="card product-card">
    <div class="card-header">
      <img src="./assets/image/cloth1.jpg">
      <span class="discount">-15%</span>
    </div>
    <div class="card-body text-center">
      <h6>Product Title</h6>
      <p class="price">$10 <del>$15</del></p>
      <button class="btn btn-outline-dark w-100 mb-2">Add to cart</button>
      <button class="btn btn-dark w-100">Buy now</button>
    </div>
  </div>
</div>

<!-- Duplicate cards as needed -->
<div class="col-12 col-md-6 col-lg-3">
  <div class="card product-card">
    <div class="card-header p-0 position-relative overflow-hidden">
      <img src="./assets/image/clothes1.jpg">
    </div>
    <div class="card-body text-center">
      <h6>Product Title</h6>
      <p class="price">$20</p>
      <button class="btn btn-outline-dark w-100 mb-2">Add to cart</button>
      <button class="btn btn-dark w-100">Buy now</button>
    </div>
  </div>
</div>

</div>
</section>


<!-- ================= CONTACT SECTION ================= -->
<section class="contact-section py-5 bg-light">
<div class="container">
<div class="row g-4">

<div class="col-md-6">
<iframe 
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.419460138427!2d104.94253187490253!3d11.556373188633155!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x310951adb4d4041d%3A0x8a90e729f62ad800!2sETEC%20Center!5e0!3m2!1sen!2skh!4v1690000000000"
width="100%" height="400" style="border:0;" loading="lazy"></iframe>
</div>

<div class="col-md-6">
<form class="p-4 bg-white shadow-sm rounded">
<h5 class="mb-4">Contact Us</h5>
<input type="text" class="form-control mb-3" placeholder="Your Name">
<input type="email" class="form-control mb-3" placeholder="Your Email">
<textarea class="form-control mb-3" rows="4" placeholder="Message"></textarea>
<button class="btn btn-dark w-100">Send Message</button>
</form>
</div>

</div>
</div>
</section>


<footer class="bg-dark text-white text-center py-4">
<p class="mb-0">© 2026 Zando. All rights reserved.</p>
</footer>

<script src="./bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
